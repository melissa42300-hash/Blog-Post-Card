<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog Post Card</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="blog-post-card">
      <img
        class="post-img"
        src="https://s.abcnews.com/images/Business/gty_coffee_day_mm-150929.jpg"
        alt="Cover photo for the blog post"
      />

      <div class="post-content">
        <h2 class="post-title">My Creative Morning Routine</h2>
        <p class="post-excerpt">
          Starting the day with simple habits can help you feel more focused,
          calm, and inspired throughout the rest of your day.
        </p>
        <a href="#" class="read-more">Read More</a>
      </div>
    </div>
  </body>
</html>
